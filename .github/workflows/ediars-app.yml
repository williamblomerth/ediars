name: Python Unit Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install redis fakeredis pytest pathvalidate python-dotenv

    - name: Run tests with pytest
      run: |
        # We use pythonpath . to ensure imports work correctly
        export PYTHONPATH=$PYTHONPATH:.
        pytest